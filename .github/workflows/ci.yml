name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so a new push doesn't waste minutes
# finishing an outdated run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Toolchain (1.94.1 + rustfmt/clippy + wasm target) is auto-installed by
      # rustup from rust-toolchain.toml on the first cargo invocation.
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      # Intentionally does NOT set `submodules:` — the `corpus-external/` corpora
      # back only the opt-in `RUN_CORPUS_SWEEP=1` sweep, which is `#[ignore]`d.
      # The default test suite (incl. the always-on vendored no-panic net) runs
      # without them; a fresh checkout must stay green. Do not add `submodules:`.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace --locked

  wasm:
    name: wasm
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Guards the full native + wasm dual-build path (the shared core AND the
      # browser-facing cdylib), not just ara-core.
      - run: cargo build -p ara-core -p ara-wasm --target wasm32-unknown-unknown --locked

  viewer-size:
    name: viewer-size
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # brotli is used for the compressed-size measurement. We do NOT install
      # binaryen (wasm-opt) from apt: ubuntu-24.04's binaryen is too old for the
      # `--enable-bulk-memory-opt` flag that current Trunk passes to wasm-opt, so
      # we let Trunk download a matching wasm-opt itself (same as it does for
      # wasm-bindgen). trunk is installed from crates.io (same trust root as
      # other dependencies); rust-cache keeps the compiled binary warm across runs.
      - name: Install system tools
        run: sudo apt-get install -y brotli
      - name: Install trunk
        run: cargo install trunk --locked
      # Use the wasm-release profile (opt-level="z", lto="fat", codegen-units=1,
      # panic="abort", strip=true) via the TRUNK_BUILD_CARGO_PROFILE env override.
      # This does NOT touch the default Trunk.toml so `trunk serve` stays on the
      # fast dev profile.
      - name: Build wasm (wasm-release profile)
        run: |
          cd crates/ara-viewer
          TRUNK_BUILD_CARGO_PROFILE=wasm-release trunk build --release
      - name: Check wasm size budget
        run: |
          WASM=$(ls crates/ara-viewer/dist/*_bg.wasm | head -1)
          UNCOMPRESSED=$(wc -c < "$WASM")
          BROTLI=$(brotli -q 11 -c "$WASM" | wc -c)

          BUDGET_UNCOMPRESSED=1048576  # 1 MB
          BUDGET_BROTLI=358400         # 350 KB

          echo "=== Wasm size report ==="
          echo "  Uncompressed : ${UNCOMPRESSED} bytes (budget: ${BUDGET_UNCOMPRESSED})"
          echo "  Brotli q11   : ${BROTLI} bytes (budget: ${BUDGET_BROTLI})"

          FAIL=0
          if [ "$UNCOMPRESSED" -ge "$BUDGET_UNCOMPRESSED" ]; then
            echo "FAIL: uncompressed ${UNCOMPRESSED} >= ${BUDGET_UNCOMPRESSED} (1 MB)"
            FAIL=1
          else
            echo "PASS: uncompressed ${UNCOMPRESSED} < ${BUDGET_UNCOMPRESSED}"
          fi
          if [ "$BROTLI" -ge "$BUDGET_BROTLI" ]; then
            echo "FAIL: brotli ${BROTLI} >= ${BUDGET_BROTLI} (350 KB)"
            FAIL=1
          else
            echo "PASS: brotli ${BROTLI} < ${BUDGET_BROTLI}"
          fi
          exit $FAIL

  viewer-embed-fresh:
    name: viewer-embed-fresh
    runs-on: ubuntu-24.04
    # Fails if the ara-viewer frontend source changed but the bundle baked into
    # ara-cli (crates/ara-cli/assets/viewer/) wasn't regenerated — so `ara serve`
    # can't silently ship a stale UI. Keyed on a content hash of the frontend
    # SOURCE (deterministic, toolchain-independent), so this job needs no trunk
    # or wasm toolchain and stays fast. Regenerate with scripts/embed-viewer.sh.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: scripts/embed-viewer.sh --check

  viewer-web-test:
    name: viewer-web-test
    runs-on: ubuntu-24.04
    # Separate job from `wasm` because it requires Chrome + wasm-pack to run
    # the wasm-bindgen-test headless-browser layer.  `wasm` only does a
    # compile-only build check; this job actually executes the browser tests.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # Ubuntu 24.04 GitHub runners ship with Chrome; no additional install step
      # is needed.  wasm-pack downloads the matching chromedriver automatically.
      # Install wasm-pack from crates.io (the same trust root as every other
      # dependency) rather than piping a remote installer to a shell; rust-cache
      # keeps the compiled binary warm across runs.
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Run browser tests (headless Chrome)
        run: wasm-pack test --headless --chrome crates/ara-viewer --locked

  docker:
    name: docker
    runs-on: ubuntu-24.04
    # Builds the hub image and smoke-tests a running container against a tiny
    # bundled fixture ARA root. Kept a separate job (Docker/buildx setup) so it
    # doesn't slow the Rust jobs. Registry push on tags is deferred (no secrets).
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: ara-hub:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Image size budget (< 20 MB compressed)
        run: |
          # `docker save | gzip` approximates the registry-compressed size.
          SIZE=$(docker save ara-hub:ci | gzip | wc -c)
          BUDGET=$((20 * 1024 * 1024))
          echo "compressed image size: ${SIZE} bytes (budget: ${BUDGET})"
          if [ "$SIZE" -ge "$BUDGET" ]; then
            echo "FAIL: image ${SIZE} >= ${BUDGET} (20 MB)"
            exit 1
          fi
          echo "PASS: image under budget"
      - name: Run container against a fixture ARA root
        run: |
          # Build a tiny root with the two official fixtures as ARA ids.
          mkdir -p aras/resnet aras/minimal
          cp -r crates/ara-core/tests/fixtures/official/resnet-ara-example/. aras/resnet/
          cp -r crates/ara-core/tests/fixtures/official/minimal-artifact/. aras/minimal/
          docker run -d --name ara-hub -p 8080:8080 \
            -v "$PWD/aras:/aras:ro" ara-hub:ci
          # Wait for readiness (the container has no shell for a healthcheck).
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://127.0.0.1:8080/; then break; fi
            sleep 1
          done
      - name: Smoke-test the endpoints
        run: |
          set -e
          BASE=http://127.0.0.1:8080

          echo "=== /a/resnet/api/manifest → 200 application/json + ETag ==="
          hdr=$(curl -fsS -D - -o /dev/null "$BASE/a/resnet/api/manifest")
          echo "$hdr" | grep -qi '^HTTP.* 200'
          echo "$hdr" | grep -qi '^content-type: application/json'
          etag=$(echo "$hdr" | grep -i '^etag:' | tr -d '\r' | awk '{print $2}')
          test -n "$etag"

          echo "=== If-None-Match → 304 ==="
          code=$(curl -fsS -o /dev/null -w '%{http_code}' \
            -H "If-None-Match: $etag" "$BASE/a/resnet/api/manifest")
          test "$code" = 304

          echo "=== /a/resnet/ → 200 text/html with <base href= ==="
          body=$(curl -fsS "$BASE/a/resnet/")
          echo "$body" | grep -q '<base href='

          echo "=== root wasm asset → 200 application/wasm ==="
          wasm=$(basename "$(ls crates/ara-cli/assets/viewer/*_bg.wasm)")
          ct=$(curl -fsS -D - -o /dev/null "$BASE/$wasm" \
            | grep -i '^content-type:' | tr -d '\r')
          echo "$ct" | grep -qi 'application/wasm'

          echo "ALL SMOKE TESTS PASSED"
      - name: Container logs (always)
        if: always()
        run: docker logs ara-hub || true
