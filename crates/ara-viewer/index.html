<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARA Viewer</title>
    <link data-trunk rel="css" href="public/styles.css" />
    <!-- Copy manifest.json to dist/ so the runtime fetch URL "manifest.json" resolves. -->
    <!-- Trunk does not auto-copy public/ contents; this directive is required.        -->
    <link data-trunk rel="copy-file" href="public/manifest.json" />
    <link data-trunk rel="rust" data-wasm-opt="z" data-wasm-opt-params="--enable-bulk-memory --enable-bulk-memory-opt" data-weak-refs />
  </head>
  <body></body>
</html>
