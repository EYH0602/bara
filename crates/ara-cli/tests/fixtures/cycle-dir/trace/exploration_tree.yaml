# N02 and N03 depend on each other -> a genuine cross-cycle (neither is an
# ancestor of the other). detect_cycles flags this as an error, so `layout` and
# `validate --layout` must report the cycle and skip layout.
tree:
  - id: N01
    type: question
    title: "Root"
    children:
      - id: N02
        type: experiment
        title: "A"
        also_depends_on: [N03]
      - id: N03
        type: insight
        title: "B"
        also_depends_on: [N02]
